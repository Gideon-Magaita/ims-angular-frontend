<div class="dashboard-layout">
  <!--DISEBAR-->
  <div class="sidebar">
    <h1 class="ims">IMS</h1>
    <ul class="nav-links">
      @if (isAuth()) {
      <li><a routerLink="/dashboard">Dashboard</a></li>
      <li><a routerLink="/transactions">Transactions</a></li>

      @if(isAdmin()) {
        <li><a routerLink="/category">Category</a></li>
        <li><a routerLink="/product">Product</a></li>
        <li><a routerLink="/supplier">Supplier</a></li>
        }

        <li><a routerLink="/purchase">Purchase</a></li>
        <li><a routerLink="/sell">Sell</a></li>
        <li><a routerLink="/profile">Profile</a></li>
        <li><a class="logout-link" (click)="logOut()">Logout</a></li>

      } @else {
        <li><a routerLink="/login">Login</a></li>
        <li><a routerLink="/register">Register</a></li>
      }
    </ul>
  </div>
  <!--MAIN CONTENTS-->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
